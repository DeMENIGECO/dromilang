<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dromi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e8f5e9;
}

/* TOP BAR */
.topbar {
  background: #2e7d32;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo {
  font-weight: bold;
}

/* HAMBURGER */
.hamburger {
  font-size: 25px;
  cursor: pointer;
}

/* MENU */
.menu-box {
  display: none;
  position: absolute;
  top: 60px;
  right: 0;
  width: 100%;
  z-index: 1000;
}

.menu-box.show {
  display: block;
}

.menu-box iframe {
  width: 100%;
  height: 200px;
  border: none;
}

/* CONTENUTO */
.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  color: #2e7d32;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Dromi</div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU (iframe) -->
<div class="menu-box" id="menu">
  <iframe src="menubar.html"></iframe>
</div>

<!-- CONTENUTO -->
<div class="header">
  <h1>Benvenuto su Dromi</h1>
  <p>La tua piattaforma 🚀</p>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
